plugins {
    id 'java'
    id 'application'
    id 'maven-publish'
    id 'com.gradleup.shadow' version '9.4.0'
}

// =============================================================================
// Project Metadata
// =============================================================================

group = 'io.eaglejs.ffxi'
version      = '1.2.1'
base.archivesName = 'ffxi-player-service'
uiPackageName = 'ffxi-stats'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
}

// =============================================================================
// Repositories
// =============================================================================

repositories {
    mavenCentral()
    maven {
        url "http://${nexusHost}:${nexusPort}/"
        allowInsecureProtocol = true
    }
}

// =============================================================================
// Project Properties
// =============================================================================

ext {
    // Nexus
    nexusMavenRepo = properties.getOrDefault('nexusMavenRepo', 'maven-releases')
    nexusNpmUrl = "http://${nexusHost}:${nexusPort}/repository/${nexusNpmRepo}/"

    // UI package
    // For production, publish a built version containing the 'dist' folder to Nexus.
    // If the package contains a 'dist' folder, only those built assets will be used.
    // Otherwise, index.html and public/ folder will be extracted from source.
    uiPackageName = properties.getOrDefault('uiPackageName', uiPackageName)
    uiPackageVersion = properties.getOrDefault('uiPackageVersion', project.version)

    // Dependency versions
    dropwizardVersion = '4.0.9'
    mongoDriverVersion = '4.11.3'
    jakartaVersion = '11.0.24'
    swaggerVersion = '2.2.22'
    junitVersion = '4.13.2'
    mockitoVersion = '5.11.0'
    jjwtVersion = '0.12.6'
}

def isTestTaskRequested = gradle.startParameter.taskNames.any {
    it.toLowerCase().contains('test')
}

// =============================================================================
// Dependencies
// =============================================================================

dependencies {
    implementation "io.dropwizard:dropwizard-core:${dropwizardVersion}"
    implementation "io.dropwizard:dropwizard-jetty:${dropwizardVersion}"
    implementation "io.dropwizard:dropwizard-client:${dropwizardVersion}"
    implementation "org.eclipse.jetty.websocket:websocket-jakarta-server:${jakartaVersion}"
    implementation "org.mongodb:mongodb-driver-sync:${mongoDriverVersion}"
    implementation "org.mongodb:mongodb-driver-core:${mongoDriverVersion}"
    implementation "org.mongodb:mongodb-driver-legacy:${mongoDriverVersion}"
    implementation "io.swagger.core.v3:swagger-jaxrs2-jakarta:${swaggerVersion}"
    implementation "io.swagger.core.v3:swagger-annotations-jakarta:${swaggerVersion}"

    testImplementation "io.dropwizard:dropwizard-testing:${dropwizardVersion}"
    testImplementation "junit:junit:${junitVersion}"
    testImplementation "org.mockito:mockito-core:${mockitoVersion}"
    testImplementation "io.jsonwebtoken:jjwt-api:${jjwtVersion}"
    testRuntimeOnly "io.jsonwebtoken:jjwt-impl:${jjwtVersion}"
    testRuntimeOnly "io.jsonwebtoken:jjwt-jackson:${jjwtVersion}"
}

// =============================================================================
// Test Configuration
// =============================================================================

test {
    useJUnit()
    jvmArgs(
            '--add-opens', 'java.base/java.lang=ALL-UNNAMED',
            '--add-opens', 'java.base/java.util=ALL-UNNAMED',
            '--add-opens', 'java.base/java.lang.reflect=ALL-UNNAMED',
            '--add-opens', 'java.base/java.io=ALL-UNNAMED',
            '--add-opens', 'java.base/java.net=ALL-UNNAMED',
            '--add-opens', 'java.base/java.nio=ALL-UNNAMED',
            '--add-opens', 'java.base/java.util.concurrent=ALL-UNNAMED',
            '--add-opens', 'java.base/sun.nio.ch=ALL-UNNAMED',
            '--add-opens', 'java.base/sun.net.dns=ALL-UNNAMED',
            '-Dnet.bytebuddy.experimental=true'
    )
}

// =============================================================================
// Application
// =============================================================================

application {
    mainClass = "${project.group}.Main"
}

// =============================================================================
// Publishing
// =============================================================================

publishing {
    publications {
        mavenJava(MavenPublication) {
            groupId = project.group
            artifactId = base.archivesName.get()
            version = project.version
            artifact(shadowJar) {
                classifier = ''
            }
        }
    }
    repositories {
        maven {
            name = 'nexus'
            url = "http://${nexusHost}:${nexusPort}/repository/${findProperty('nexusMavenRepo') ?: 'maven-releases'}/"
            allowInsecureProtocol = true
            if (project.hasProperty('nexusUsername') && project.hasProperty('nexusPassword')) {
                credentials {
                    username = nexusUsername
                    password = nexusPassword
                }
            }
        }
    }
}

// =============================================================================
// Build Artifacts
// =============================================================================

shadowJar {
    archiveClassifier.set('')
    mergeServiceFiles()

    manifest {
        attributes 'Main-Class': "${project.group}.Main"
    }

    exclude 'META-INF/*.SF'
    exclude 'META-INF/*.DSA'
    exclude 'META-INF/*.RSA'

    doLast {
        logger.lifecycle("Shadow JAR created at: ${archiveFile.get().asFile.absolutePath}")
        logger.lifecycle("Size: ${archiveFile.get().asFile.length() / 1024 / 1024} MB")
    }
}

build.dependsOn shadowJar

// =============================================================================
// UI Tasks
// =============================================================================

task copyWebApp(type: Copy) {
    description = 'Copy webapp resources to build directory'
    from 'src/main/webapp'
    into layout.buildDirectory.dir("resources/main/webapp")
}

task downloadUI(type: Exec) {
    description = 'Download UI package from Nexus npm repository'
    def downloadDir = layout.buildDirectory.dir("ui-download").get().asFile
    def tarFile = file("${downloadDir}/${project.ext.uiPackageName}-${project.ext.uiPackageVersion}.tgz")
    def nexusUrl = "${project.ext.nexusNpmUrl}/${project.ext.uiPackageName}/-/${project.ext.uiPackageName}-${project.ext.uiPackageVersion}.tgz"

    outputs.file(tarFile)
    outputs.upToDateWhen {
        tarFile.exists()
    }

    onlyIf {
        def markerFile = new File(downloadDir, "download-failed.marker")
        !isTestTaskRequested && !markerFile.exists()
    }

    doFirst {
        downloadDir.mkdirs()
        logger.lifecycle("Downloading UI package from ${nexusUrl}")
    }

    commandLine 'curl', '-f', '-L', '-o', tarFile.absolutePath, '--create-dirs', nexusUrl
    ignoreExitValue = true

    doLast {
        if (executionResult.get().exitValue != 0) {
            logger.warn("Failed to download UI from Nexus (curl exit code: ${executionResult.get().exitValue})")
            logger.warn("Will use placeholder UI instead")
            if (tarFile.exists()) tarFile.delete()
            new File(downloadDir, "download-failed.marker").text = "curl failed with exit code ${executionResult.get().exitValue}"
        } else {
            logger.lifecycle("Downloaded UI package to ${tarFile} (${tarFile.length()} bytes)")
        }
    }
}

task extractUI {
    description = 'Extract UI package from tar.gz'
    dependsOn downloadUI

    def downloadDir = layout.buildDirectory.dir("ui-download").get().asFile
    def tarFile = file("${downloadDir}/${project.ext.uiPackageName}-${project.ext.uiPackageVersion}.tgz")
    def assetsDir = layout.buildDirectory.dir("resources/main/assets").get().asFile
    def extractTempDir = file("${downloadDir}/extracted")

    inputs.file(tarFile)
    outputs.dir(assetsDir)

    onlyIf {
        !isTestTaskRequested && tarFile.exists()
    }

    doLast {
        project.copy {
            from(tarTree(resources.gzip(tarFile))) {
                eachFile {file -> file.path = file.path.replaceFirst('package/', '')
                }
            }
            into extractTempDir
            includeEmptyDirs = false
        }

        def distDir = new File(extractTempDir, 'dist')
        def sourceDir = distDir.exists() ? distDir : extractTempDir

        logger.lifecycle("Using UI files from: ${sourceDir}")

        project.copy {
            from sourceDir
            into assetsDir
            exclude '**/*.tgz'
            exclude '**/node_modules/**'
            exclude '**/.git/**'
            exclude '**/.vscode/**'
            exclude '**/src/**'
            exclude '**/package.json'
            exclude '**/tsconfig*.json'
            exclude '**/*.config.*'
            exclude '**/.*'

            if (!distDir.exists()) {
                include 'index.html'
                include 'assets/**'
                include 'public/**'
            }
        }

        extractTempDir.deleteDir()
        logger.lifecycle("Extracted UI to ${assetsDir} (${assetsDir.listFiles()?.size() ?: 0} items)")
    }
}

task showArtifactLocation {
    doLast {
        logger.lifecycle("JAR artifact will be created at: ${layout.buildDirectory.get().asFile}/libs/${base.archivesName.get()}-${version}.jar")
    }
}

processResources.dependsOn copyWebApp, extractUI, showArtifactLocation

// =============================================================================
// Development Tasks
// =============================================================================

task runDev(type: JavaExec) {
    description = 'Run application in development mode (use with --continuous for auto-restart)'
    group = 'application'
    dependsOn classes

    classpath = sourceSets.main.runtimeClasspath
    mainClass = application.mainClass
    standardInput = System.in

    def configFile = file('config.yml')
    if (configFile.exists()) {
        args 'server', configFile.absolutePath
    }

    jvmArgs = [
            '-Xdebug',
            '-Xrunjdwp:transport=dt_socket,server=y,suspend=n,address=5005',
            '-Ddw.server.applicationConnectors[0].port=8080',
            '-Ddw.logging.level=INFO'
    ]

    doFirst {
        logger.lifecycle("Starting application in development mode...")
        logger.lifecycle("Files being watched: src/main/java, src/main/resources")
        logger.lifecycle("Run with: ./gradlew runDev --continuous")
        logger.lifecycle("Debug port: 5005")
    }
}

task runDevWatch {
    description = 'Run application with automatic reload on file changes (use -Pconfig="server config.yml")'
    group = 'application'

    doLast {
        def configArg = project.hasProperty('config') ? project.property('config') : 'server config.yml'
        def configParts = configArg.split(/\s+/)

        logger.lifecycle("")
        logger.lifecycle("=" * 80)
        logger.lifecycle("${project.name} Development Service - Development Watch Mode")
        logger.lifecycle("=" * 80)
        logger.lifecycle("Watching: src/main/java, src/main/resources")
        logger.lifecycle("Config: ${configParts.join(' ')}")
        logger.lifecycle("Debug port: 5005")
        logger.lifecycle("")
        logger.lifecycle("Press Ctrl+C to stop")
        logger.lifecycle("=" * 80)
        logger.lifecycle("")

        def serverProcess = null
        def lastModified = [:]
        def isShuttingDown = false

        Runtime.runtime.addShutdownHook(new Thread({
            isShuttingDown = true
            if (serverProcess?.alive) {
                logger.lifecycle("\nShutting down server...")
                serverProcess.destroy()
                serverProcess.waitForOrKill(5000)
            }
        }))

        def startServer = {
            if (serverProcess?.alive) {
                logger.lifecycle("Stopping server...")
                serverProcess.destroy()
                serverProcess.waitForOrKill(5000)
                Thread.sleep(1000)
            }

            logger.lifecycle("Building project...")
            def buildResult = project.exec {
                commandLine './gradlew', 'classes', '--quiet'
                ignoreExitValue = true
            }

            if (buildResult.exitValue != 0) {
                logger.error("Build failed! Server not started.")
                return
            }

            logger.lifecycle("Starting server...")
            def javaCmd = [
                    'java',
                    '-Xdebug',
                    '-Xrunjdwp:transport=dt_socket,server=y,suspend=n,address=5005',
                    '-Ddw.server.applicationConnectors[0].port=8080',
                    '-Ddw.logging.level=INFO',
                    '-cp', sourceSets.main.runtimeClasspath.asPath,
                    "${project.group}.Main",
                    *configParts
            ]

            def processBuilder = new ProcessBuilder(javaCmd as List<String>)
            processBuilder.inheritIO()
            processBuilder.directory(project.projectDir)
            serverProcess = processBuilder.start()

            logger.lifecycle("Server started (PID: ${serverProcess.pid()})")
            logger.lifecycle("Watching for changes...\n")
        }

        def collectFiles = {
            def files = [:]
            ['src/main/java', 'src/main/resources'].each {dir ->
                fileTree(dir).each {file -> files[file.absolutePath] = file.lastModified()
                }
            }
            return files
        }

        def checkForChanges = {
            def currentFiles = collectFiles()
            def changed = false

            currentFiles.each {path, modified ->
                if (!lastModified.containsKey(path) || lastModified[path] != modified) {
                    if (lastModified.containsKey(path)) {
                        logger.lifecycle("Changed: ${file(path).name}")
                        changed = true
                    }
                }
            }

            lastModified.keySet().each {path ->
                if (!currentFiles.containsKey(path)) {
                    logger.lifecycle("Deleted: ${file(path).name}")
                    changed = true
                }
            }

            lastModified = currentFiles
            return changed
        }

        lastModified = collectFiles()
        startServer()

        while (!isShuttingDown && !Thread.currentThread().interrupted) {
            Thread.sleep(1000)
            if (checkForChanges()) {
                logger.lifecycle("\n" + "=" * 80)
                logger.lifecycle("Changes detected - Restarting server...")
                logger.lifecycle("=" * 80 + "\n")
                startServer()
            }
        }
    }
}
