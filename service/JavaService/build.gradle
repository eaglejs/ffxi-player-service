plugins {
    id 'java'
    id 'application'
}

repositories {
    mavenCentral()
    maven {
        url 'http://eaglejs-mac-mini.local:8091/'
        allowInsecureProtocol = true
    }
}

dependencies {
    implementation 'io.dropwizard:dropwizard-core:2.0.24'
    implementation 'io.dropwizard:dropwizard-client:2.0.24'
    implementation 'io.dropwizard:dropwizard-assets:2.0.24'
    implementation 'javax.websocket:javax.websocket-api:1.1'
    implementation 'org.eclipse.jetty.websocket:javax-websocket-server-impl:9.4.43.v20210629'
    implementation 'org.mongodb:mongodb-driver-sync:4.3.4'
    implementation 'org.mongodb:mongodb-driver-core:4.3.4'
    implementation 'org.mongodb:mongodb-driver-legacy:4.3.4'
    implementation 'org.glassfish.jersey.core:jersey-client:2.32'
    implementation 'org.glassfish.jersey.inject:jersey-hk2:2.32'
    implementation 'org.glassfish.jersey.media:jersey-media-json-jackson:2.32'
    implementation 'io.swagger.core.v3:swagger-jaxrs2:2.1.11'
    implementation 'io.swagger.core.v3:swagger-annotations:2.1.11'

    testImplementation 'io.dropwizard:dropwizard-testing:2.0.24'
    testImplementation 'junit:junit:4.13.2'
    testImplementation 'org.mockito:mockito-core:4.0.0'
}

test {
    useJUnit()
}

application {
    mainClass = 'io.eaglejs.ffxi.Main'
}

jar {
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    from {
        configurations.runtimeClasspath.collect { it.isDirectory() ? it : zipTree(it) }
    }
    manifest {
        attributes 'Main-Class': 'io.eaglejs.ffxi.Main'
    }
}

task npmInstallStats(type: Exec) {
    description = 'Install ffxi-stats package from custom npm registry'
    workingDir 'src/main/webapp'
    commandLine 'npm', 'install', 'http://eaglejs-mac-mini.local:8091/repository/npm-hosted/ffxi-stats/-/ffxi-stats-1.0.0.tgz'
    onlyIf { !file("src/main/webapp/node_modules/ffxi-stats").exists() }
}

task npmInstallStatsDeps(type: Exec) {
    description = 'Install ffxi-stats build dependencies'
    dependsOn npmInstallStats
    workingDir 'src/main/webapp/node_modules/ffxi-stats'
    commandLine 'npm', 'install'
    onlyIf { !file("src/main/webapp/node_modules/ffxi-stats/node_modules").exists() }
}

task buildStats(type: Exec) {
    description = 'Build the ffxi-stats Vue application'
    dependsOn npmInstallStatsDeps
    workingDir 'src/main/webapp/node_modules/ffxi-stats'
    commandLine 'npm', 'run', 'build'
    onlyIf { !file("src/main/webapp/node_modules/ffxi-stats/dist").exists() }
}

task copyNpmAssets(type: Copy) {
    description = 'Copy ffxi-stats built output into webapp static directory'
    dependsOn buildStats
    from 'src/main/webapp/node_modules/ffxi-stats/dist'
    into 'src/main/webapp/assets'
}

task copyWebApp(type: Copy) {
    dependsOn copyNpmAssets
    from 'src/main/webapp'
    into "$buildDir/resources/main/webapp"
    exclude 'node_modules'
    exclude 'package.json'
    exclude 'package-lock.json'
}

processResources.dependsOn copyWebApp