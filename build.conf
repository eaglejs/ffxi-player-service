# build.conf — vale-car-club project configuration for build.sh

# ── Directory layout ──────────────────────────────────────────────────────────
APP_DIR="$SCRIPT_DIR/app"
SERVICE_DIR="$SCRIPT_DIR/service"

# ── Frontend build ────────────────────────────────────────────────────────────
NPM_BUILD_PROD_SCRIPT="build:prod"
NPM_BUILD_TEST_SCRIPT="build:test"
NPM_REGISTRY="http://eaglejs-mac-mini.local:8091/repository/npm-hosted"

# ── Backend build ─────────────────────────────────────────────────────────────
SERVICE_JAR_BASE_NAME="ffxi-player-service"
GRADLE_TEST_BUILD_FLAGS="-PuseLocalUI"

# ── Deployment — test environment ─────────────────────────────────────────────
TEST_SERVER_HOST="test.ffxi.eaglejs.io"
TEST_SERVER_USER="ec2-user"
TEST_SERVER_SSH_KEY="~/.ssh/eaglejs.pem"
TEST_SERVER_REMOTE_PATH="./"

# ── Deployment — production environment ───────────────────────────────────────
PROD_SERVER_HOST="192.168.5.30"
PROD_SERVER_USER="eaglejs"
PROD_SERVER_SSH_KEY="~/.ssh/mac-mini"
PROD_SERVER_REMOTE_PATH="./"

# ── Git ───────────────────────────────────────────────────────────────────────
GIT_MAIN_BRANCH="main"
